# Cloud Build pipeline: build → push to Artifact Registry → migrate → deploy.
#
# One-time setup is documented in infra/gcp/setup.sh. Trigger this with:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=europe-west1,_SERVICE=storex,_SQL_INSTANCE=PROJECT:REGION:storex-pg

substitutions:
  _REGION: europe-west1
  _REPOSITORY: storex
  _SERVICE: storex
  _SQL_INSTANCE: '' # PROJECT:REGION:INSTANCE

steps:
  # 1. Build the production image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - .

  # 2. Push it
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  # 3. Run database migrations against Cloud SQL (release phase).
  #    Uses the just-built image, which carries prisma/ and the CLI.
  - name: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
    id: migrate
    entrypoint: npx
    args: ['prisma', 'migrate', 'deploy']
    secretEnv: ['DATABASE_URL']

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-env-vars=ANALYTICS_SOURCE=bigquery,GCP_PROJECT_ID=$PROJECT_ID,BIGQUERY_DATASET=storex_analytics
      - --set-secrets=DATABASE_URL=storex-database-url:latest,WORKOS_API_KEY=storex-workos-api-key:latest,WORKOS_CLIENT_ID=storex-workos-client-id:latest,WORKOS_COOKIE_PASSWORD=storex-workos-cookie-password:latest,WORKOS_REDIRECT_URI=storex-workos-redirect-uri:latest
      - --min-instances=0
      - --max-instances=4
      - --memory=1Gi
      - --cpu=1

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/storex-database-url/versions/latest
      env: DATABASE_URL

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
